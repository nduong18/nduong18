<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Snake</title>
<style>
    body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        font-family: Arial;
    }
    canvas {
        background: #222;
    }
</style>
</head>
<body>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake = [{x:10, y:10}];
let food = {x:15, y:15};
let score = 0;

function randomFood() {
    food = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
    };
}

// BFS tìm đường
function findPath(start, target, snakeBody) {
    let queue = [start];
    let visited = {};
    let parent = {};

    const key = (p) => p.x + "," + p.y;

    visited[key(start)] = true;

    while (queue.length > 0) {
        let current = queue.shift();

        if (current.x === target.x && current.y === target.y) {
            let path = [];
            let curKey = key(current);
            while (curKey !== key(start)) {
                let [x, y] = curKey.split(",").map(Number);
                path.unshift({x, y});
                curKey = parent[curKey];
            }
            return path;
        }

        let dirs = [
            {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
        ];

        for (let d of dirs) {
            let nx = current.x + d.x;
            let ny = current.y + d.y;

            let newPos = {x:nx, y:ny};
            let k = key(newPos);

            if (
                nx >= 0 && ny >= 0 &&
                nx < tileCount && ny < tileCount &&
                !visited[k] &&
                !snakeBody.some(s => s.x === nx && s.y === ny)
            ) {
                queue.push(newPos);
                visited[k] = true;
                parent[k] = key(current);
            }
        }
    }

    return null;
}

function update() {
    let path = findPath(snake[0], food, snake);

    let next;
    if (path && path.length > 0) {
        next = path[0];
    } else {
        // fallback: đi random nếu bí
        let dirs = [
            {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
        ];
        for (let d of dirs) {
            let nx = snake[0].x + d.x;
            let ny = snake[0].y + d.y;
            if (
                nx >= 0 && ny >= 0 &&
                nx < tileCount && ny < tileCount &&
                !snake.some(s => s.x === nx && s.y === ny)
            ) {
                next = {x:nx, y:ny};
                break;
            }
        }
    }

    if (!next) return;

    snake.unshift(next);

    if (next.x === food.x && next.y === food.y) {
        score++;
        randomFood();
    } else {
        snake.pop();
    }
}

function draw() {
    ctx.fillStyle = "#222";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // snake
    ctx.fillStyle = "lime";
    snake.forEach(s => {
        ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize-2, gridSize-2);
    });

    // food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize-2, gridSize-2);

    // score
    ctx.fillStyle = "white";
    ctx.fillText("Score: " + score, 10, 15);
}

function loop() {
    update();
    draw();
}

setInterval(loop, 120);
</script>

</body>
</html>
